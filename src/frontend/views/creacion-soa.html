<!DOCTYPE html>
<html>
<head>
    <title>Gestión de SoA</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h2 {
            text-align: center;
        }

        button {
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }

        form {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>

<body>

<h2>Declaración de Aplicabilidad (SoA)</h2>

<form id="soaForm">

    <select id="organizacion" required>
        <option value="">Seleccione organización</option>
    </select>

    <label>Seleccionar controles</label>

    <select id="controles" multiple required style="height:200px;">
    </select>

    <input
        type="text"
        id="responsable"
        placeholder="Responsable"
        required
    >

    <input
        type="text"
        id="descripcion"
        placeholder="Descripción del SoA"
        required
    >

    <button type="submit">
        Generar Nueva SoA
    </button>

</form>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Versión</th>
            <th>Fecha</th>
            <th>Acción</th>
        </tr>
    </thead>
    <tbody id="tablaSoA"></tbody>
</table>

<h3>Detalle</h3>
<table>
    <thead>
        <tr>
            <th>Código</th>
            <th>Descripción</th>
            <th>Aplica</th>
            <th>Justificación</th>
            <th>Estado</th>
            <th>Acción</th>
        </tr>
    </thead>

    <tbody id="detalleSoA"></tbody>
</table>

<script>

async function cargarSoA() {
    const response = await fetch("/api/soa/list-soa");
    const data = await response.json();

    const tabla = document.getElementById("tablaSoA");
    tabla.innerHTML = "";

    data.forEach(soa => {
        tabla.innerHTML += `
            <tr>
                <td>${soa.id}</td>
                <td>${soa.version}</td>
                <td>${soa.fecha}</td>
                <td>
                    <button onclick="verDetalle(${soa.id})">
                        Ver Detalle
                    </button>

                    <button onclick="descargarDocumento(${soa.id})">
                        Descargar Word
                    </button>
                </td>
            </tr>
        `;
    });
}

document.getElementById("soaForm")
.addEventListener("submit", async function(e) {

    e.preventDefault();

    const organizacion_id =
        document.getElementById("organizacion").value;

    const responsable =
        document.getElementById("responsable").value;

    const descripcion =
        document.getElementById("descripcion").value;

    const controlesSelect =
        document.getElementById("controles");

    const controles =
        Array.from(controlesSelect.selectedOptions)
        .map(option => option.value);

    const formData = new FormData();

    formData.append("organizacion_id", organizacion_id);
    formData.append("responsable", responsable);
    formData.append("descripcion", descripcion);

    controles.forEach(control => {
        formData.append("controles", control);
    });

    const response = await fetch("/api/soa/generate", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    if (!response.ok) {
        alert(data.detail);
        return;
    }

    alert(data.message);

    cargarSoA();
});

async function verDetalle(id) {

    const response = await fetch(`/api/soa/detail/${id}`);

    const data = await response.json();

    const tabla = document.getElementById("detalleSoA");

    tabla.innerHTML = "";

    data.forEach(item => {

        tabla.innerHTML += `
            <tr>

                <td>${item.codigo}</td>

                <td>${item.descripcion}</td>

                <td>
                    <select id="aplica-${item.id}">
                        <option value="true" ${item.aplica ? "selected" : ""}>
                            Sí
                        </option>

                        <option value="false" ${!item.aplica ? "selected" : ""}>
                            No
                        </option>
                    </select>
                </td>

                <td>
                    <input
                        type="text"
                        id="justificacion-${item.id}"
                        value="${
                            item.aplica
                            ? (item.justificacion_inclusion || "")
                            : (item.justificacion_exclusion || "")
                        }"
                    >
                </td>

                <td>
                    <select id="estado-${item.id}">

                        <option value="PENDIENTE"
                            ${item.estado_implementacion == "PENDIENTE" ? "selected" : ""}>
                            PENDIENTE
                        </option>

                        <option value="IMPLEMENTADO"
                            ${item.estado_implementacion == "IMPLEMENTADO" ? "selected" : ""}>
                            IMPLEMENTADO
                        </option>

                        <option value="NO IMPLEMENTADO"
                            ${item.estado_implementacion == "NO IMPLEMENTADO" ? "selected" : ""}>
                            NO IMPLEMENTADO
                        </option>

                    </select>
                </td>

                <td>
                    <button onclick="guardarControl(${item.id})">
                        Guardar
                    </button>
                </td>

            </tr>
        `;
    });
}

async function guardarControl(id) {

    const aplica =
        document.getElementById(`aplica-${id}`).value;

    const justificacion =
        document.getElementById(`justificacion-${id}`).value;

    const estado =
        document.getElementById(`estado-${id}`).value;

    const formData = new FormData();

    formData.append("aplica", aplica === "true");
    formData.append("justificacion", justificacion);
    formData.append("estado_implementacion", estado);

    const response = await fetch(`/api/soa/control/${id}`, {
        method: "PUT",
        body: formData
    });

    const data = await response.json();

    if (!response.ok) {
        alert(data.detail);
        return;
    }

    alert(data.message);
}

async function incluirControl(id) {

    const justificacion = prompt(
        "Justificación de inclusión:"
    );

    if (!justificacion) return;

    const formData = new FormData();

    formData.append("aplica", true);

    formData.append(
        "justificacion",
        justificacion
    );

    formData.append(
        "estado_implementacion",
        "IMPLEMENTADO"
    );

    await fetch(`/api/soa/control/${id}`, {
        method: "PUT",
        body: formData
    });

    alert("Control incluido");
}

async function excluirControl(id) {

    const justificacion = prompt(
        "Justificación de exclusión:"
    );

    if (!justificacion) return;

    const formData = new FormData();

    formData.append("aplica", false);

    formData.append(
        "justificacion",
        justificacion
    );

    formData.append(
        "estado_implementacion",
        "NO APLICA"
    );

    await fetch(`/api/soa/control/${id}`, {
        method: "PUT",
        body: formData
    });

    alert("Control excluido");
}

async function cargarOrganizaciones() {

    const response = await fetch(
        "/api/soa/organizations"
    );

    const data = await response.json();

    const select = document.getElementById(
        "organizacion"
    );

    data.forEach(org => {

        select.innerHTML += `
            <option value="${org.id}">
                ${org.nombre}
            </option>
        `;
    });
}

async function cargarControles() {

    const response = await fetch("/api/control/listar-controles");

    const data = await response.json();

    const select = document.getElementById("controles");

    select.innerHTML = "";

    data.forEach(control => {

        select.innerHTML += `
            <option value="${control.id}">
                ${control.codigo} - ${control.descripcion}
            </option>
        `;
    });
}

function descargarDocumento(id) {
    window.open(`/api/soa/generate-doc/${id}`, '_blank');
}

cargarOrganizaciones();
cargarControles();
cargarSoA();

</script>

</body>
</html>
