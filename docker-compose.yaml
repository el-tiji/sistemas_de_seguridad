version: '3'

services:

  mysql:
    image: mysql:8

    container_name: sgsi_mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sgsi
      MYSQL_USER: sgsi_user
      MYSQL_PASSWORD: sgsi_password

    ports:
      - "5001:3306"

    volumes:
        - ./src/backend/db/database.sql:/docker-entrypoint-initdb.d/database.sql

  backend:
    build: .
    container_name: sgsi_api

    depends_on:
      - mysql

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: uvicorn src.backend.main:app --host 0.0.0.0 --port 8000 --reload