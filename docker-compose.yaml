version: '3'

services:

  postgres:
    image: postgres:16

    container_name: sgsi_postgres

    environment:
      POSTGRES_DB: sgsi_1urk
      POSTGRES_USER: sgsiproyecto_wp2q_user
      POSTGRES_PASSWORD: FqttuG8fLqRHrjQaPkUynTDjTa0NTY72

    ports:
      - "5432:5432"

  backend:
    build: .

    container_name: sgsi_api

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: uvicorn src.backend.main:app --host 0.0.0.0 --port 8000 --reload